# Nome do servidor
sv_hostname "Zero One RP - Desenvolvimento"

# Senha (deixe vazio para servidor público)
sv_password ""

# Máximo de jogadores
sv_maxclients 64

# Idioma
locale "pt-BR"

# OneSync
set onesync on

# Tags
sets tags "roleplay,rp,brasil,zeroone"

# Banner
sets banner_detail ""
sets banner_connecting ""

# Banco de Dados
set mysql_connection_string "mysql://root:senha@127.0.0.1/zeroone"

# Recursos principais
ensure chat
ensure spawnmanager
ensure sessionmanager

# Core
ensure zof_core
ensure zof_player
ensure zof_spawn
ensure zof_identity
ensure zof_notify
ensure zof_hud

# Admin
# ensure zof_admin

# Jobs
# ensure zof_jobs

# Vehicles
# ensure zof_garage

# UI
# ensure zof_loading

# Maps

# Scripts

# Permissões
add_ace group.admin command allow
add_principal identifier.fivem:1 group.admin

